name: A股每日自动复盘（含周末消息精复盘）

on:
  schedule:
    - cron: '42 7 * * *'  # UTC 7:42 = 北京 15:42 (三重兜底)
  workflow_dispatch:
  repository_dispatch:
    types: [afternoon]

permissions:
  contents: write
  actions: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⏰ 时间判断 —— 不是目标时段直接跳过
        id: check
        run: |
          HOUR_BJ=$(TZ='Asia/Shanghai' date +%H)
          MIN_BJ=$(TZ='Asia/Shanghai' date +%M)
          WEEKDAY=$(TZ='Asia/Shanghai' date +%u)
          echo "北京时间: ${HOUR_BJ}:${MIN_BJ} 星期${WEEKDAY}"
          
          if [ "$WEEKDAY" -ge 6 ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "⏭️ 周末"
            exit 0
          fi
          
          # 午后复盘窗口: 15:00-16:00
          if [ "$HOUR_BJ" = "15" ]; then
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "✅ 在午后复盘窗口"
          else
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "⏭️ 非推送时段"
          fi
      
      - name: 📥 拉取代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python 环境
        if: steps.check.outputs.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 安装依赖
        if: steps.check.outputs.SKIP != 'true'
        run: pip install --quiet openai requests akshare
      
      - name: 🚀 生成复盘报告
        if: steps.check.outputs.SKIP != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python scripts/auto_report.py
      
      - name: 📤 提交报告到仓库
        if: steps.check.outputs.SKIP != 'true'
        run: |
          if [ -z "$(ls -A reports/ 2>/dev/null)" ]; then
            echo "ℹ️ 今日无报告，跳过提交"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️ 无变更，跳过提交"
          else
            git commit -m "chore: 自动更新 $(date +%Y-%m-%d) 复盘报告"
            git push
          fi
        continue-on-error: true
      
      - name: 📎 上传报告为 Artifact
        if: steps.check.outputs.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: a-stock-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
        continue-on-error: true

      # ===== 自触发链：精准休眠到下一个目标时间 =====
      - name: 🔗 自触发下一轮
        run: |
          bash scripts/sleep_until_target.sh 15 || exit 0
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily_report.yml/dispatches" \
            -d '{"ref":"main"}'
