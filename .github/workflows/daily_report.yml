name: A股每日自动复盘（含周末消息精复盘）

on:
  # 每天 UTC 07:30 = 北京时间 15:30
  schedule:
    - cron: '35 7 * * *'
  
  # 支持手动触发
  workflow_dispatch:

# 赋予写权限，否则 git push 会失败
permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 安装依赖
        run: |
          pip install --quiet openai requests akshare
      
      - name: 🚀 生成复盘报告
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python scripts/auto_report.py
      
      - name: 📤 提交报告到仓库
        run: |
          if [ -z "$(ls -A reports/ 2>/dev/null)" ]; then
            echo "ℹ️ 今日无报告，跳过提交"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️ 无变更，跳过提交"
          else
            git commit -m "chore: 自动更新 $(date +%Y-%m-%d) 复盘报告"
            git push
          fi
      
      - name: 📎 上传报告为 Artifact（备用下载）
        uses: actions/upload-artifact@v4
        with:
          name: a-stock-report-${{ github.run_number }}
          path: reports/
          retention-days: 30
        continue-on-error: true
