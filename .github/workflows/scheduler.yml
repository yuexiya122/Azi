name: 定时调度器（心跳）

on:
  schedule:
    - cron: '17 * * * *'  # 每小时17分 UTC（避开整点拥堵）
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: ⏰ 判断是否到推送时间
        run: |
          HOUR_BJ=$(TZ='Asia/Shanghai' date +%H)
          WEEKDAY=$(TZ='Asia/Shanghai' date +%u)
          
          echo "北京时间: ${HOUR_BJ}点 星期${WEEKDAY}"
          
          if [ "$WEEKDAY" -ge 6 ]; then
            echo "⏭️ 周末，跳过"
            exit 0
          fi
          
          # 盘前简报：UTC 0点 = 北京8点
          if [ "$HOUR_BJ" = "08" ]; then
            echo "🌅 触发盘前简报..."
            curl -s -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/morning_briefing.yml/dispatches" \
              -d '{"ref":"main"}'
            echo ""
            exit 0
          fi
          
          # 午后复盘：UTC 7点 = 北京15点
          if [ "$HOUR_BJ" = "15" ]; then
            echo "📈 触发午后复盘..."
            curl -s -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily_report.yml/dispatches" \
              -d '{"ref":"main"}'
            echo ""
            exit 0
          fi
          
          echo "⏭️ 非推送时段，跳过"
