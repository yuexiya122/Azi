name: 全天复盘 15:30

on:
  schedule:
    - cron: '30 7 * * 1-5'  # UTC 7:30 = 北京 15:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet openai requests akshare
      - name: 📈 全天复盘
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python scripts/auto_report.py
      - name: 📤 提交报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 全天复盘 $(date +%Y-%m-%d)" && git push)
        continue-on-error: true
