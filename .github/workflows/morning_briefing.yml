name: 每日盘前简报

on:
  schedule:
    - cron: '52 0 * * 1-5'  # UTC 0:52 = 北京 8:52 (三重兜底)
  workflow_dispatch:
  repository_dispatch:
    types: [morning]

permissions:
  contents: write
  actions: write

jobs:
  morning-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: ⏰ 时间判断
        id: check
        run: |
          HOUR_BJ=$(TZ='Asia/Shanghai' date +%H)
          WEEKDAY=$(TZ='Asia/Shanghai' date +%u)
          echo "北京时间: ${HOUR_BJ}点 星期${WEEKDAY}"
          
          if [ "$WEEKDAY" -ge 6 ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "⏭️ 周末"
            exit 0
          fi
          
          if [ "$HOUR_BJ" = "08" ]; then
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "✅ 在盘前简报窗口"
          else
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "⏭️ 非推送时段"
          fi

      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        if: steps.check.outputs.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        if: steps.check.outputs.SKIP != 'true'
        run: pip install --quiet openai requests akshare

      - name: 🌅 生成盘前简报
        if: steps.check.outputs.SKIP != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          REPORT_TYPE: morning
        run: python scripts/auto_report.py

      - name: 📤 提交报告到仓库
        if: steps.check.outputs.SKIP != 'true'
        run: |
          if [ -z "$(ls -A reports/ 2>/dev/null)" ]; then
            echo "ℹ️ 无新报告，跳过提交"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️ 无变更，跳过提交"
          else
            git commit -m "chore: 自动更新盘前简报 $(date +%Y-%m-%d)"
            git push
          fi
        continue-on-error: true

      - name: 📎 上传报告为 Artifact
        if: steps.check.outputs.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: morning-briefing-${{ github.run_number }}
          path: reports/
          retention-days: 7
        continue-on-error: true

      - name: 🔗 自触发下一轮
        run: |
          bash scripts/sleep_until_target.sh 8 || exit 0
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/morning_briefing.yml/dispatches" \
            -d '{"ref":"main"}'
