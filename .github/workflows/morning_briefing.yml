name: 每日盘前简报

on:
  # 由定时调度器触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 安装依赖
        run: |
          pip install --quiet openai requests akshare
      
      - name: 🌅 生成盘前简报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          REPORT_TYPE: morning
        run: |
          python scripts/auto_report.py
      
      - name: 📤 提交报告到仓库
        run: |
          if [ -z "$(ls -A reports/ 2>/dev/null)" ]; then
            echo "ℹ️ 无新报告，跳过提交"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          if git diff --quiet && git diff --staged --quiet; then
            echo "ℹ️ 无变更，跳过提交"
          else
            git commit -m "chore: 自动更新盘前简报 $(date +%Y-%m-%d)"
            git push
          fi
      
      - name: 📎 上传报告为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: morning-briefing-${{ github.run_number }}
          path: reports/
          retention-days: 7
        continue-on-error: true
