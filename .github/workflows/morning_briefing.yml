name: 每日盘前简报

on:
  schedule:
    - cron: '52 0 * * 1-5'  # UTC 0:52 = 北京 8:52
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 📦 安装依赖
        run: pip install --quiet openai requests akshare
      - name: 🌅 生成盘前简报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          REPORT_TYPE: morning
        run: python scripts/auto_report.py
      - name: 📤 提交报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 盘前简报 $(date +%Y-%m-%d)" && git push)
        continue-on-error: true
