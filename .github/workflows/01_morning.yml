name: 盘前简报 8:00

on:
  schedule:
    - cron: '0 0 * * 1-5'  # UTC 0:00 = 北京 8:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet openai requests akshare
      - name: 🌅 盘前简报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          REPORT_TYPE: morning
        run: python scripts/auto_report.py
      - name: 📤 提交报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 盘前简报 $(date +%Y-%m-%d)" && git push)
        continue-on-error: true
