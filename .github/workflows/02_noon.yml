name: 午间总结 12:00

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet openai requests akshare
      - name: ☀️ 午间总结
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          REPORT_TYPE: noon
        run: python scripts/auto_report.py
      - name: 📤 提交报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase
          git add reports/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 午间总结 $(date +%Y-%m-%d)" && git push)
        continue-on-error: true
